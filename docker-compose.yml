version: '3.8'

services:
  backend:
    build: 
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OCR_SERVICE_URL=http://ocr-service:8000
    depends_on:
      - ocr-service
    volumes:
      - shared_uploads:/usr/src/app/uploads

  ocr-service:
    build:
      context: ./ocr-service
    ports:
      - "8000:8000"
    volumes:
      - shared_uploads:/usr/src/app/uploads

volumes:
  shared_uploads:
